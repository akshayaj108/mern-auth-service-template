sonar.projectKey=akshayaj108_mern-auth-service-template
sonar.organization=akshayaj108

sonar.projectName=mern-auth-service-template

sonar.sources=src
sonar.tests=tests

sonar.exclusions=**/node_modules/**/*,**/dist/**/*,**/build/**/*,**/migration/**/*

sonar.test.inclusions=tests/**/*.spec.ts

sonar.javascript.lcov.reportPaths=./coverage/lcov.info

sonar.scm.exclusions.disabled=true

sonar.sourceEncoding=UTF-8

# exclude files that are not testable from coverage
sonar.coverage.exclusions=\
  src/server.ts,\
  src/utils.ts,\
  src/types/**,\
  src/migrations/**,\
  src/config/data-source.ts